<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>JQSplits</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15201c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JQSplits">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15201c;
    --surface:#1d2a25;
    --surface2:#25342d;
    --text:#eef1ee;
    --text-dim:#8fa39a;
    --accent:#5fd1a0;
    --accent-dim:#5fd1a033;
    --warn:#f0a847;
    --warn-dim:#f0a84733;
    --success:#5fd1a0;
    --success-dim:#5fd1a033;
    --border:#2a3a33;
    --radius:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  body{padding-bottom:90px;}
  h1,h2,h3,.display{font-family:'Oswald',sans-serif; letter-spacing:0.02em; text-transform:uppercase;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  button{font-family:inherit; cursor:pointer;}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* HEADER */
  header{
    padding:20px 18px 14px;
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:20;
    background:var(--bg);
  }
  .header-top{display:flex; justify-content:space-between; align-items:baseline;}
  .wordmark{font-size:22px; font-weight:700; color:var(--text);}
  .wordmark span{color:var(--accent);}
  .week-badge{font-size:13px; color:var(--text-dim);}
  .week-badge b{color:var(--text); font-family:'IBM Plex Mono', monospace;}

  /* PLATE STACK SIGNATURE (reused as session fill bar) */
  .plate-stack{
    display:flex; align-items:flex-end; gap:3px; height:34px; margin-top:12px;
  }
  .plate-stack .plate{
    flex:1; background:var(--surface2); border-radius:3px 3px 0 0;
    transition:height .4s ease, background .4s ease;
    height:6px;
  }
  .plate-stack .plate.filled{background:var(--accent);}
  .plate-stack .plate.pr{background:var(--warn);}

  /* STREAK ROW */
  .streak-row{display:flex; gap:16px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border);}
  .streak-stat{display:flex; flex-direction:column; gap:2px;}
  .streak-num{font-family:'IBM Plex Mono', monospace; font-size:16px; font-weight:600; color:var(--text);}
  .streak-label{font-size:10px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-dim);}

  /* DAY TABS */
  nav.days{
    display:flex; gap:6px; padding:14px 14px 0; overflow-x:auto;
    -ms-overflow-style:none; scrollbar-width:none; position:sticky; top:111px; z-index:19; background:var(--bg);
    padding-bottom:14px; border-bottom:1px solid var(--border);
  }
  nav.days::-webkit-scrollbar{display:none;}
  .day-tab{
    flex:0 0 auto; background:var(--surface); border:1px solid var(--border); color:var(--text-dim);
    padding:10px 14px; border-radius:999px; font-size:13px; font-weight:600; white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .day-tab.active{background:var(--accent-dim); border-color:var(--accent); color:var(--accent);}
  .day-tab .dot{width:6px; height:6px; border-radius:50%; background:var(--border);}
  .day-tab.done .dot{background:var(--success);}

  main{padding:18px 16px 0;}

  .day-heading{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:4px;}
  .day-heading h2{font-size:26px; font-weight:700;}
  .day-heading .muscles{font-size:12px; color:var(--text-dim); text-transform:none; font-family:-apple-system,sans-serif; margin-top:2px;}

  .toolbar{display:flex; gap:8px; margin:14px 0 16px;}
  .btn{
    border:1px solid var(--border); background:var(--surface); color:var(--text);
    padding:9px 14px; border-radius:8px; font-size:13px; font-weight:600;
  }
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#0a1c14;}
  .btn.ghost{color:var(--text-dim);}
  .btn:active{transform:scale(0.97);}

  /* SESSION CARD */
  .session-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; margin-top:14px;
  }
  .session-row{display:flex; gap:12px;}
  .session-field{flex:1; min-width:0; display:flex; flex-direction:column; gap:6px;}
  .session-field.full{margin-top:12px;}
  .session-field label{font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim); font-weight:600;}
  .session-field input{
    width:100%; min-width:0; background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text);
    font-family:'IBM Plex Mono', monospace; font-size:15px; padding:9px 10px;
  }
  .session-field textarea{
    width:100%; min-width:0; background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text);
    font-family:inherit; font-size:13px; padding:9px 10px; resize:vertical; min-height:54px;
  }
  .timer-control{min-width:0; display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:6px 6px 6px 12px;}
  .timer-control span{flex:1; min-width:0; font-size:17px; font-weight:600;}
  .timer-control .btn{flex:0 0 auto; padding:7px 12px; font-size:12px;}

  /* EXERCISE CARD */
  .exercise{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; margin-bottom:12px;
  }
  .ex-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .ex-name{font-size:15px; font-weight:600; line-height:1.3;}
  .ex-target{font-size:12px; color:var(--text-dim); margin-top:2px; font-family:'IBM Plex Mono', monospace;}
  .ex-progress-ring{
    width:38px; height:38px; border-radius:50%; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:600; font-family:'IBM Plex Mono', monospace;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--surface2) 0);
  }
  .ex-progress-ring::after{
    content:attr(data-label); width:30px; height:30px; border-radius:50%;
    background:var(--surface); display:flex; align-items:center; justify-content:center;
  }
  .suggestion{
    margin-top:10px; padding:8px 10px; background:var(--accent-dim); border-radius:7px;
    font-size:12.5px; color:var(--accent); display:flex; align-items:center; gap:6px;
  }
  .suggestion.bigjump{background:var(--warn-dim); color:var(--warn);}
  .suggestion.reduce{background:#ff5d5d22; color:#ff5d5d;}
  .sets{margin-top:12px; display:flex; flex-direction:column; gap:8px;}
  .set-row{display:grid; grid-template-columns:28px 1fr 1fr 36px; gap:8px; align-items:center;}
  .set-label{font-size:12px; color:var(--text-dim); font-family:'IBM Plex Mono', monospace;}
  .set-row input{
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:7px;
    color:var(--text); font-family:'IBM Plex Mono', monospace; font-size:15px; padding:9px 8px;
    text-align:center;
  }
  .set-row input:focus{border-color:var(--accent);}
  .set-check{
    width:34px; height:34px; border-radius:7px; border:1px solid var(--border); background:var(--surface2);
    color:var(--text-dim); font-size:16px; display:flex; align-items:center; justify-content:center;
  }
  .set-check.checked{background:var(--success-dim); border-color:var(--success); color:var(--success);}
  .ex-meta-row{display:grid; grid-template-columns:28px 1fr 1fr 36px; gap:8px; margin-bottom:2px;}
  .ex-meta-row span{font-size:10px; text-transform:uppercase; color:var(--text-dim); text-align:center; letter-spacing:0.05em;}
  .last-week-note{
    margin-top:10px; font-size:12px; color:var(--text-dim); padding-top:10px; border-top:1px solid var(--border);
  }
  .last-week-note b{color:var(--text); font-family:'IBM Plex Mono', monospace;}

  /* CHECKLIST ITEMS (cardio/recovery rows) */
  .checklist-item{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; margin-bottom:12px; display:flex; align-items:center; gap:12px;
  }
  .checklist-item .check-circle{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface2);
    color:var(--text-dim); flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:15px;
  }
  .checklist-item .check-circle.checked{background:var(--success-dim); border-color:var(--success); color:var(--success);}
  .checklist-item .check-label{font-size:14px; font-weight:500; flex:1;}
  .checklist-item.done .check-label{color:var(--text-dim); text-decoration:line-through;}

  .empty-state{text-align:center; padding:50px 20px; color:var(--text-dim);}
  .empty-state .big{font-size:40px; margin-bottom:10px;}
  .recovery-banner{
    background:var(--warn-dim); border:1px solid var(--warn); border-radius:var(--radius);
    padding:12px 14px; margin:14px 0; font-size:13px; color:var(--warn); display:flex; gap:8px; align-items:flex-start;
  }

  /* WEEKLY VIEW */
  .week-grid{display:grid; gap:10px;}
  .week-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px;}
  .week-card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .week-card-head h3{font-size:14px; font-weight:600;}
  .week-card .ex-line{display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-top:1px solid var(--border);}
  .week-card .ex-line:first-of-type{border-top:none;}
  .ex-line .name{color:var(--text-dim);}
  .ex-line .stat{font-family:'IBM Plex Mono', monospace;}
  .ex-line .stat.up{color:var(--success);}

  /* PROGRESS VIEW */
  .progress-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:12px;}
  .progress-card-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;}
  .progress-ex-name{font-size:14px; font-weight:600;}
  .progress-ex-sub{font-size:11px; color:var(--text-dim); margin-top:2px;}
  .progress-delta{font-family:'IBM Plex Mono', monospace; font-size:14px; font-weight:600; text-align:right; color:var(--text-dim);}
  .progress-delta.up{color:var(--success);}
  .progress-delta.down{color:#ff5d5d;}
  .progress-delta-pct{display:block; font-size:11px; opacity:0.8;}
  .chart-wrap{margin:6px 0 2px;}
  .chart-empty{font-size:12px; color:var(--text-dim); padding:20px 0; text-align:center;}
  .chart-footer{display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); font-family:'IBM Plex Mono', monospace;}

  .settings-row{display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row .label{font-size:14px;}
  .settings-row .sub{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .settings-row input[type=number]{
    width:70px; background:var(--surface2); border:1px solid var(--border); color:var(--text);
    font-family:'IBM Plex Mono', monospace; font-size:14px; padding:7px; border-radius:7px; text-align:center;
  }
  .danger{color:#ff5d5d;}

  /* REST TIMER BAR */
  .rest-timer-bar{
    position:fixed; left:12px; right:12px; bottom:80px; z-index:40;
    background:var(--surface); border:1px solid var(--accent); border-radius:12px; overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .rest-timer-bar.done{border-color:var(--success);}
  .rt-fill{position:absolute; inset:0; width:0%; background:var(--accent-dim); transition:width .25s linear;}
  .rest-timer-bar.done .rt-fill{background:var(--success-dim); width:100% !important;}
  .rt-content{position:relative; display:flex; align-items:center; gap:10px; padding:12px 14px;}
  .rt-content span:first-child{font-size:12px; text-transform:uppercase; color:var(--text-dim); font-weight:600;}
  .rt-time{font-family:'IBM Plex Mono', monospace; font-size:22px; font-weight:600; flex:1;}
  .rest-timer-bar.done .rt-time{color:var(--success);}
  .rt-skip{background:none; border:1px solid var(--border); color:var(--text-dim); padding:6px 12px; border-radius:7px; font-size:12px; font-weight:600;}

  /* INSTALL BANNER */
  .install-banner{
    position:fixed; left:12px; right:12px; bottom:80px; z-index:45;
    background:var(--surface); border:1px solid var(--accent); border-radius:12px;
    padding:12px 14px; display:flex; align-items:center; gap:10px;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
  }
  .install-icon{font-size:24px; flex:0 0 auto;}
  .install-text{flex:1; min-width:0;}
  .install-title{font-size:13px; font-weight:700;}
  .install-sub{font-size:11.5px; color:var(--text-dim); margin-top:2px;}
  .install-banner .btn{flex:0 0 auto; padding:8px 14px; font-size:12px;}
  .install-dismiss{
    flex:0 0 auto; background:none; border:none; color:var(--text-dim); font-size:16px;
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  }

  /* BOTTOM NAV */
  .bottombar{
    position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border);
    display:flex; z-index:30; padding-bottom:env(safe-area-inset-bottom);
  }
  .bottombar button{
    flex:1; background:none; border:none; color:var(--text-dim); padding:13px 0 10px; font-size:11px;
    display:flex; flex-direction:column; align-items:center; gap:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.03em;
  }
  .bottombar button.active{color:var(--accent);}
  .bottombar svg{width:20px; height:20px;}

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--success); color:#0a1c14; padding:10px 18px; border-radius:999px; font-size:13px; font-weight:600;
    transition:all .25s ease; z-index:50; pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="wordmark">JQ<span>·</span>SPLITS</div>
  </div>
  <div class="header-top" style="margin-top:6px;">
    <div class="week-badge">WEEK <b id="weekNum">1</b></div>
    <div class="week-badge" id="dayProgressLabel">0 / 0 done today</div>
  </div>
  <div class="plate-stack" id="plateStack"></div>
  <div class="streak-row" id="streakRow"></div>
</header>

<nav class="days" id="dayTabs"></nav>

<main id="view"></main>

<div class="bottombar">
  <button class="tab-btn active" data-view="train">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7v10M2 9v6M18 7v10M22 9v6M6 12h12"/></svg>
    Train
  </button>
  <button class="tab-btn" data-view="week">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
    Week
  </button>
  <button class="tab-btn" data-view="progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>
    Progress
  </button>
  <button class="tab-btn" data-view="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============== DATA MODEL ============== */

   Exercises with a fixed rep target use {sets, repRange:[n,n]}.
   "bodyweight" exercises (push-ups, pull-ups, planks) track reps/holds but no weight suggestion. */

      {id:"leg_press", name:"Leg Press", sets:3, repRange:[12,12]},
      {id:"walking_lunge", name:"Walking Lunges (each leg)", sets:3, repRange:[12,12]},

  },

    label: "Recovery", muscles: "Active rest day",

    checklist: [

      {id:"stretch", label:"Stretch"},
      {id:"eatclean", label:"Eat clean"},

      {id:"pullups", name:"Pull-Ups (or Assisted)", sets:3, repRange:[6,10], bodyweight:true},
      {id:"db_shoulder_press", name:"Dumbbell Shoulder Press", sets:3, repRange:[12,12]},
      {id:"chest_row", name:"Chest Supported Row", sets:3, repRange:[12,12]},
      {id:"lateral_raise2", name:"Lateral Raises", sets:3, repRange:[15,15]},
      {id:"cable_curl", name:"Cable Curls", sets:3, repRange:[15,15]},
      {id:"rope_pushdown", name:"Tricep Rope Pushdowns", sets:3, repRange:[15,15]},
    ],
    checklist: []
  },
  conditioning: {
    label: "Full Body Conditioning", muscles: "Full body, moderate intensity",
    exercises: [
      {id:"goblet_squat", name:"Goblet Squats", sets:3, repRange:[15,15]},
      {id:"pushup", name:"Push-Ups", sets:3, repRange:[10,20], bodyweight:true},
      {id:"kb_swing", name:"Kettlebell Swings", sets:3, repRange:[20,20]},
      {id:"db_row", name:"Dumbbell Rows", sets:3, repRange:[12,12]},
      {id:"plank", name:"Plank (seconds per round)", sets:3, repRange:[30,60], bodyweight:true},
    ],
    checklist: [{id:"treadmill20", label:"Incline treadmill walk — 20 mins"}],
    note: "Keep intensity moderate today."
  },

    exercises: [],
    checklist: [
      {id:"walk_rest", label:"Walk"},
      {id:"recover", label:"Recover"},

      {id:"sleepearly", label:"Sleep early"},
    ]
  }
};
const DAY_ORDER = ["push","pull","legs","recovery","upper","conditioning","rest"]; // Day 1-7

const STORE_KEY = "jqsplits_tracker_v1";
function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {
    week: 1,
    progressionPct: 5,
    restSeconds: 90,
    startDate: new Date().toISOString().slice(0,10),
    logs: {},      // logs[dayKey][exId] = {sets:[{weight,reps,done}]}
    checklists: {},// checklists[dayKey][itemId] = true/false
    history: {},   // history[exId] = [{week, weight, topReps, repRange:[low,high]}]
    sessions: {}   // sessions[dayKey] = {durationMin, calories, notes, timerStart, timerRunning}
  };
}
let state = loadState();
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function todayDayType(){
  const d = new Date().getDay(); // 0=Sun
  const idx = (d + 6) % 7; // Mon=0
  return DAY_ORDER[idx];
}
let activeDayType = todayDayType();
let activeView = "train";

function dayKey(weekNum, dayType){ return `w${weekNum}_${dayType}`; }

function getLog(dayType){
  const key = dayKey(state.week, dayType);
  if(!state.logs[key]) state.logs[key] = {};
  return state.logs[key];
}
function getChecklist(dayType){
  const key = dayKey(state.week, dayType);
  if(!state.checklists[key]) state.checklists[key] = {};
  return state.checklists[key];
}
function getSession(dayType){
  const key = dayKey(state.week, dayType);
  if(!state.sessions[key]) state.sessions[key] = {durationMin:"", calories:"", notes:"", timerStart:null, timerRunning:false};
  return state.sessions[key];
}
function formatMin(totalMin){
  totalMin = Number(totalMin)||0;
  const h = Math.floor(totalMin/60);
  const m = totalMin%60;
  return h>0 ? `${h}:${String(m).padStart(2,"0")}:00` : `${m}:00`;
}

function getExerciseLog(dayType, exId, exDef){
  const log = getLog(dayType);
  if(!log[exId]){
    log[exId] = { sets: Array.from({length: exDef.sets}, () => ({weight:"", reps:"", done:false})) };
  }
  return log[exId];
}

function getPrevWeekEntry(exId){
  const hist = state.history[exId] || [];
  return hist.find(h => h.week === state.week - 1) || null;
}

/* ============== PROGRESSION: REPS-FIRST ==============
   Logic: if last week's top reps < top of range, suggest +1-2 reps at the same weight.
   If last week's top reps already AT the top of range, suggest a weight bump (using progressionPct)
   and reset target reps back to the bottom of the range.
   If last week's reps fell short of the bottom of the range, hold weight and reps (no regression unless badly missed). */
function getSuggestion(exId, exDef){
  const hist = state.history[exId] || [];
  if(hist.length === 0) return null;
  const last = hist[hist.length-1];
  const [low, high] = exDef.repRange;
  const pct = state.progressionPct / 100;

  if(exDef.bodyweight){
    // Bodyweight: progression is reps/seconds only, no weight field
    if(last.topReps >= high){
      const bump = Math.min(2, Math.max(1, Math.round((high-low)*0.15)) || 1);
      return {weight:null, targetReps: last.topReps + bump, reason:`hit ${last.topReps} last week — push for ${last.topReps+bump}`, tier:'reps'};
    }
    const bump = last.topReps < low ? 0 : 1;
    return {weight:null, targetReps: last.topReps + bump, reason: bump ? `add a rep — aim for ${last.topReps+bump}` : `repeat ${last.topReps} — build consistency first`, tier: bump ? 'reps' : 'repeat'};
  }

  if(last.topReps >= high){
    // At top of range — bump weight, reset reps to bottom
    const newWeight = Math.round((last.weight * (1+pct)) * 2) / 2;
    return {weight:newWeight, targetReps: low, reason:`hit ${last.topReps} reps at ${last.weight}kg — up the weight, reset to ${low} reps`, tier:'weight'};
  }
  if(last.topReps < low){
    // Missed bottom of range — hold steady, don't regress automatically
    return {weight:last.weight, targetReps: low, reason:`only ${last.topReps} reps last week — repeat ${last.weight}kg, aim for ${low}`, tier:'repeat'};
  }
  // In range but below top — add 1-2 reps at same weight
  const bump = Math.min(2, high - last.topReps);
  return {weight:last.weight, targetReps: last.topReps + bump, reason:`add reps — ${last.weight}kg for ${last.topReps+bump} this week`, tier:'reps'};
}

function maybeRecordHistory(dayType, exId, exDef){
  const log = getLog(dayType)[exId];
  if(!log) return;
  const allDone = log.sets.every(s => s.done && s.reps !== "" && (exDef.bodyweight || s.weight !== ""));
  if(!allDone) return;
  const topReps = Math.max(...log.sets.map(s => Number(s.reps)||0));
  const topWeight = exDef.bodyweight ? null : Math.max(...log.sets.map(s => Number(s.weight)||0));
  if(!state.history[exId]) state.history[exId] = [];
  const hist = state.history[exId];
  const existingIdx = hist.findIndex(h => h.week === state.week);
  const entry = {week: state.week, weight: topWeight, topReps, repRange: exDef.repRange};
  if(existingIdx >= 0) hist[existingIdx] = entry; else hist.push(entry);
  saveState();
}

/* ============== REST TIMER ============== */
let restTimerInterval = null;
let restTimerEndsAt = null;
function startRestTimer(seconds){
  if(!seconds) return;
  clearInterval(restTimerInterval);
  restTimerEndsAt = Date.now() + seconds*1000;
  renderRestTimerBar();
  restTimerInterval = setInterval(tickRestTimer, 250);
  if(navigator.vibrate) navigator.vibrate(40);
}
function tickRestTimer(){
  const remaining = Math.max(0, Math.round((restTimerEndsAt - Date.now())/1000));
  const bar = document.getElementById("restTimerBar");
  if(!bar){ clearInterval(restTimerInterval); return; }
  if(remaining <= 0){
    clearInterval(restTimerInterval);
    restTimerEndsAt = null;
    bar.classList.add("done");
    bar.querySelector(".rt-time").textContent = "GO";
    if(navigator.vibrate) navigator.vibrate([100,60,100,60,200]);
    setTimeout(()=>{ if(bar) bar.remove(); }, 1800);
    return;
  }
  bar.querySelector(".rt-time").textContent = remaining;
  bar.querySelector(".rt-fill").style.width = (100 - (remaining/bar.dataset.total*100)) + "%";
}
function renderRestTimerBar(){
  let bar = document.getElementById("restTimerBar");
  const total = Math.round((restTimerEndsAt - Date.now())/1000);
  if(!bar){
    bar = document.createElement("div");
    bar.id = "restTimerBar";
    bar.className = "rest-timer-bar";
    document.body.appendChild(bar);
  }
  bar.classList.remove("done");
  bar.dataset.total = total;
  bar.innerHTML = `<div class="rt-fill"></div><div class="rt-content"><span>Rest</span><span class="rt-time">${total}</span><button class="rt-skip" id="rtSkip">Skip</button></div>`;
  document.getElementById("rtSkip").addEventListener("click", () => {
    clearInterval(restTimerInterval);
    bar.remove();
  });
}

/* ============== SESSION STOPWATCH ============== */
let sessionTickInterval = null;
function startSessionTimer(dayType){
  const sess = getSession(dayType);
  sess.timerRunning = true;
  sess.timerStart = Date.now() - (Number(sess.durationMin)||0)*60000;
  saveState();
  clearInterval(sessionTickInterval);
  sessionTickInterval = setInterval(()=>tickSessionTimer(dayType), 1000);
}
function stopSessionTimer(dayType){
  const sess = getSession(dayType);
  if(sess.timerRunning){
    sess.durationMin = Math.round((Date.now()-sess.timerStart)/60000);
  }
  sess.timerRunning = false;
  sess.timerStart = null;
  clearInterval(sessionTickInterval);
  saveState();
}
function tickSessionTimer(dayType){
  const sess = getSession(dayType);
  const el = document.getElementById("sessionTimerDisplay");
  if(!el || !sess.timerRunning){ clearInterval(sessionTickInterval); return; }
  const mins = Math.floor((Date.now()-sess.timerStart)/60000);
  const secs = Math.floor(((Date.now()-sess.timerStart)%60000)/1000);
  el.textContent = `${mins}:${String(secs).padStart(2,"0")}`;
}

/* ============== STREAK & CONSISTENCY ============== */
function dayHasCompletion(dayType, week){
  const key = dayKey(week, dayType);
  const dayLog = state.logs[key];
  const lifted = dayLog && Object.values(dayLog).some(ex => ex.sets && ex.sets.length && ex.sets.every(s=>s.done));
  const checklist = state.checklists[key];
  const checkedOff = checklist && Object.values(checklist).some(v => v === true);
  return Boolean(lifted || checkedOff);
}
function getWeekSessionCount(){
  let count = 0;
  DAY_ORDER.forEach(t => { if(t!=="rest" && t!=="recovery" && dayHasCompletion(t, state.week)) count++; });
  return count;
}
function getStreak(){
  let streak = 0;
  for(let w = state.week; w >= 1; w--){
    const trained = DAY_ORDER.some(t => t!=="rest" && dayHasCompletion(t, w));
    if(trained) streak++; else break;
  }
  return streak;
}
function getTotalSessionsCompleted(){
  let total = 0;
  const seen = new Set();
  Object.keys(state.logs).forEach(key => {
    const dayLog = state.logs[key];
    if(Object.values(dayLog).some(ex => ex.sets && ex.sets.length && ex.sets.every(s=>s.done))) seen.add(key);
  });
  Object.keys(state.checklists).forEach(key => {
    const cl = state.checklists[key];
    if(Object.values(cl).some(v=>v===true)) seen.add(key);
  });
  return seen.size;
}

function renderPlateStack(){
  const def = PROGRAM[activeDayType];
  const log = getLog(activeDayType);
  const checklist = getChecklist(activeDayType);
  const stack = document.getElementById("plateStack");

  let totalItems = 0, doneItems = 0, anyBig = false;
  def.exercises.forEach(ex => {
    const l = log[ex.id];
    totalItems += ex.sets;
    if(l) doneItems += l.sets.filter(s=>s.done).length;
    const sugg = getSuggestion(ex.id, ex);
    if(sugg && sugg.tier === 'weight') anyBig = true;
  });
  (def.checklist||[]).forEach(item => {
    totalItems += 1;
    if(checklist[item.id]) doneItems += 1;
  });

  document.getElementById("dayProgressLabel").textContent = `${doneItems} / ${totalItems} done today`;
  document.getElementById("weekNum").textContent = state.week;

  const slots = 12;
  const filledCount = totalItems ? Math.round((doneItems/totalItems)*slots) : 0;
  let html = "";
  for(let i=0;i<slots;i++){
    const filled = i < filledCount;
    const h = 6 + Math.round((i/slots)*28);
    html += `<div class="plate ${filled ? (anyBig?'pr':'filled') : ''}" style="height:${h}px"></div>`;
  }
  stack.innerHTML = html;
}

/* ============== RENDER: PROGRESS VIEW ============== */
function buildSparkline(history, width, height){
  if(history.length < 2) return `<div class="chart-empty">Log 2+ weeks to see a trend</div>`;
  const usesWeight = history[0].weight !== null;
  const values = history.map(h => usesWeight ? h.weight : h.topReps);
  const minV = Math.min(...values), maxV = Math.max(...values);
  const range = maxV - minV || 1;
  const padX = 8, padY = 10;
  const innerW = width - padX*2, innerH = height - padY*2;
  const points = history.map((h,i) => {
    const v = usesWeight ? h.weight : h.topReps;
    const x = padX + (i/(history.length-1))*innerW;
    const y = padY + innerH - ((v-minV)/range)*innerH;
    return {x,y,h};
  });
  const pathD = points.map((p,i)=> (i===0?'M':'L') + p.x.toFixed(1) + ' ' + p.y.toFixed(1)).join(' ');
  const areaD = pathD + ` L${points[points.length-1].x.toFixed(1)} ${height-padY} L${points[0].x.toFixed(1)} ${height-padY} Z`;
  const dots = points.map((p,i) => {
    const isLast = i===points.length-1;
    const hitTop = p.h.topReps >= p.h.repRange[1];
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${isLast?4:2.5}" fill="${hitTop?'var(--success)':'var(--warn)'}" />`;
  }).join('');
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" preserveAspectRatio="none">
      <path d="${areaD}" fill="var(--accent-dim)" opacity="0.5"/>
      <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2"/>
      ${dots}
    </svg>`;
}

function renderProgressView(){
  const container = document.getElementById("view");
  let html = `<div class="day-heading"><h2>Progress</h2></div>`;
  let anyData = false;

  DAY_ORDER.forEach(t => {
    const def = PROGRAM[t];
    def.exercises.forEach(ex => {
      const hist = (state.history[ex.id] || []).slice().sort((a,b)=>a.week-b.week);
      if(hist.length === 0) return;
      anyData = true;
      const first = hist[0], last = hist[hist.length-1];
      const usesWeight = first.weight !== null;
      const delta = usesWeight ? (last.weight - first.weight) : (last.topReps - first.topReps);
      const deltaPct = usesWeight ? (first.weight ? Math.round((delta/first.weight)*100) : 0) : (first.topReps ? Math.round((delta/first.topReps)*100) : 0);
      const unit = usesWeight ? 'kg' : ' reps';
      html += `
        <div class="progress-card">
          <div class="progress-card-head">
            <div>
              <div class="progress-ex-name">${ex.name}</div>
              <div class="progress-ex-sub">${def.label} · ${hist.length} week${hist.length>1?'s':''} logged</div>
            </div>
            <div class="progress-delta ${delta>0?'up':delta<0?'down':''}">
              ${delta>0?'▲':delta<0?'▼':'–'} ${Math.abs(delta)}${unit}
              <span class="progress-delta-pct">${deltaPct>=0?'+':''}${deltaPct}%</span>
            </div>
          </div>
          <div class="chart-wrap">${buildSparkline(hist, 320, 90)}</div>
          <div class="chart-footer">
            <span>Wk ${first.week}: ${usesWeight?first.weight+'kg':first.topReps+' reps'}</span>
            <span>Wk ${last.week}: ${usesWeight?last.weight+'kg':last.topReps+' reps'}</span>
          </div>
        </div>
      `;
    });
  });

  if(!anyData){
    html += `<div class="empty-state"><div class="big">📈</div>Complete an exercise (all sets checked) to start tracking trends here.</div>`;
  }
  container.innerHTML = html;
}

/* ============== RENDER: SETTINGS VIEW ============== */
function renderSettingsView(){
  const container = document.getElementById("view");
  container.innerHTML = `
    <div class="day-heading"><h2>Settings</h2></div>
    <div class="exercise">
      <div class="settings-row">
        <div><div class="label">Progression rate</div><div class="sub">Weight increase once you hit the top of a rep range</div></div>
        <input type="number" id="pctInput" value="${state.progressionPct}" step="0.5" min="0" max="20"> %
      </div>
      <div class="settings-row">
        <div><div class="label">Rest timer</div><div class="sub">Countdown after each logged set</div></div>
        <input type="number" id="restInput" value="${state.restSeconds}" step="15" min="0" max="300"> sec
      </div>
      <div class="settings-row">
        <div><div class="label">Current week</div><div class="sub">Manually jump if needed</div></div>
        <input type="number" id="weekInput" value="${state.week}" min="1">
      </div>
      <div class="settings-row">
        <div><div class="label danger">Reset all data</div><div class="sub">Clears every log and history. Cannot be undone.</div></div>
        <button class="btn" id="resetAllBtn" style="border-color:#ff5d5d; color:#ff5d5d;">Reset</button>
      </div>
    </div>
  `;
  document.getElementById("pctInput").addEventListener("change", e => { state.progressionPct = Number(e.target.value)||0; saveState(); showToast("Progression rate updated"); });
  document.getElementById("restInput").addEventListener("change", e => { state.restSeconds = Number(e.target.value)||0; saveState(); showToast("Rest timer updated"); });
  document.getElementById("weekInput").addEventListener("change", e => { state.week = Math.max(1, Number(e.target.value)||1); saveState(); renderAll(); });
  document.getElementById("resetAllBtn").addEventListener("click", () => {
    if(confirm("This deletes ALL logs and history permanently. Continue?")){
      state = {week:1, progressionPct:5, restSeconds:90, startDate:new Date().toISOString().slice(0,10), logs:{}, checklists:{}, history:{}, sessions:{}};
      saveState();
      renderAll();
      showToast("All data cleared");
    }
  });
}

/* ============== TOAST ============== */
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 1600);
}

/* ============== MASTER RENDER ============== */
function renderAll(){
  renderDayTabs();
  renderPlateStack();
  renderStreakRow();
  if(activeView === "train") renderTrainView();
  else if(activeView === "week") renderWeekView();
  else if(activeView === "progress") renderProgressView();
  else renderSettingsView();

  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.view === activeView);
  });
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    activeView = btn.dataset.view;
    renderAll();
  });
});

renderAll();

/* ============== PWA: SERVICE WORKER + INSTALL PROMPT ============== */
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}

let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner();
});
window.addEventListener("appinstalled", () => {
  deferredInstallPrompt = null;
  hideInstallBanner();
});

function isStandalone(){
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

function showInstallBanner(){
  if(isStandalone()) return;
  if(localStorage.getItem("jqsplits_install_dismissed") === "1") return;
  let banner = document.getElementById("installBanner");
  if(banner) return;
  banner = document.createElement("div");
  banner.id = "installBanner";
  banner.className = "install-banner";
  banner.innerHTML = `
    <div class="install-icon">🏃</div>
    <div class="install-text">
      <div class="install-title">Install JQSplits</div>
      <div class="install-sub">Add to your home screen for quick gym access</div>
    </div>
    <button class="btn primary" id="installBtn">Install</button>
    <button class="install-dismiss" id="installDismiss">✕</button>
  `;
  document.body.appendChild(banner);
  document.getElementById("installBtn").addEventListener("click", async () => {
    if(!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    hideInstallBanner();
  });
  document.getElementById("installDismiss").addEventListener("click", () => {
    localStorage.setItem("jqsplits_install_dismissed", "1");
    hideInstallBanner();
  });
}
function hideInstallBanner(){
  const banner = document.getElementById("installBanner");
  if(banner) banner.remove();
}

function isIos(){
  return /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
}
if(isIos() && !isStandalone() && localStorage.getItem("jqsplits_install_dismissed") !== "1"){
  let banner = document.createElement("div");
  banner.id = "installBanner";
  banner.className = "install-banner";
  banner.innerHTML = `
    <div class="install-icon">🏃</div>
    <div class="install-text">
      <div class="install-title">Install JQSplits</div>
      <div class="install-sub">Tap Share, then "Add to Home Screen"</div>
    </div>
    <button class="install-dismiss" id="installDismissIos">✕</button>
  `;
  document.body.appendChild(banner);
  document.getElementById("installDismissIos").addEventListener("click", () => {
    localStorage.setItem("jqsplits_install_dismissed", "1");
    hideInstallBanner();
  });
}
</script>
</body>
</html>
